<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedic Kundali Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #fed7aa;
      --lavender: #e9d5ff;
      --sky: #bae6fd;
      --mint: #bbf7d0;
      --pink: #fce7f3;
      --cream: #fff7ed;
      --dark: #2c2055;
      --text: #3a3060;
      --muted: #7a6fa0;
      --white: #ffffff;
      --orange: #f97316;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #f8f9ff;
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Report Styles */
    #reportContent {
      padding: 30px 0;
    }

    .k-section {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 28px 0 14px 0;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--lavender);
    }

    .k-card {
      background: var(--white);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(44, 32, 85, 0.08);
      transition: box-shadow 0.3s;
    }

    .k-card:hover {
      box-shadow: 0 6px 20px rgba(44, 32, 85, 0.15);
    }

    .k-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .k-item {
      background: #f9f6ff;
      border-left: 4px solid var(--dark);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .k-label {
      font-size: 0.72em;
      color: var(--dark);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .k-value {
      font-size: 0.95em;
      font-weight: 700;
      color: #222;
    }

    .k-charts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      text-align: center;
    }

    .k-chart-box {
      padding: 16px;
      background: #f9f6ff;
      border-radius: 12px;
    }

    .k-chart-box h4 {
      font-family: 'Cinzel', serif;
      font-size: 1em;
      color: var(--dark);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .k-chart-box > div {
      border: 2px solid var(--lavender);
      border-radius: 10px;
      overflow: visible;
      background: #fff;
      padding: 8px;
    }

    .k-chart-box svg {
      width: 100%;
      height: auto;
      max-width: 100%;
      display: block;
    }

    .k-chart-box img {
      width: 100%;
      height: auto;
      max-width: 100%;
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88em;
    }

    thead {
      background: linear-gradient(135deg, var(--dark), #4a3580);
      color: #fff;
    }

    thead th {
      padding: 10px 12px;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--lavender);
    }

    tbody tr:hover {
      background: #f9f6ff;
    }

    tbody td {
      padding: 9px 12px;
    }

    .k-remedy li {
      padding: 8px 0;
      border-bottom: 1px solid var(--lavender);
      font-size: 0.92em;
      list-style: none;
    }

    .green {
      color: #1a7a35;
    }

    .red {
      color: #c0392b;
    }

    /* Header and Footer */
    .report-header {
      text-align: center;
      padding: 20px 0 10px 0;
      border-bottom: 1px solid var(--lavender);
      margin-bottom: 20px;
    }

    .report-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8em;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .report-header p {
      color: var(--muted);
      font-size: 0.9em;
    }

    .report-footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--lavender);
      margin-top: 30px;
      color: var(--muted);
      font-size: 0.8em;
    }

    .print-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--dark), #4a3580);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(44, 32, 85, 0.2);
      z-index: 1000;
      transition: all 0.3s;
    }

    .print-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(44, 32, 85, 0.3);
    }

    .close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--pink);
      color: var(--dark);
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      z-index: 1000;
    }

    .close-btn:hover {
      background: #f8c5d9;
    }

    /* Print Styles */
    @media print {
      * {
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: white;
      }
      body > * {
        display: block !important;
      }
      .print-btn, .close-btn {
        display: none !important;
      }
      #reportContent {
        display: block !important;
      }
      .k-card {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .k-section {
        page-break-inside: avoid;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead {
        display: table-header-group;
      }
      tbody tr {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      * {
        box-shadow: none !important;
        animation: none !important;
      }
    }

    @media (max-width: 768px) {
      .k-charts {
        grid-template-columns: 1fr;
      }

      .print-btn {
        bottom: 10px;
        right: 10px;
        padding: 10px 20px;
        font-size: 0.85em;
      }

      .close-btn {
        top: 10px;
        right: 10px;
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()">✕ Close</button>
  <button class="print-btn" onclick="window.print()">📄 Print / Save PDF</button>

  <div class="container">
    <div id="reportContent"></div>
  </div>

  <script>
    // Read report from sessionStorage
    const reportHTML = sessionStorage.getItem('kundaliReport');
    const name = sessionStorage.getItem('kundaliName');

    if (reportHTML) {
      document.getElementById('reportContent').innerHTML = reportHTML;
      document.title = (name || 'Kundali') + ' - Vedic Report';
    } else {
      document.getElementById('reportContent').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">No report data found. Please generate a Kundali first.</p>';
    }

    // Download PDF function (for button in report)
    function downloadKundaliPDF(nameParam) {
      window.print();
    }
  </script>
</body>
</html>
